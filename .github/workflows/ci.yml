name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 1.66.0

      - name: Generate protobuf stubs
        run: |
          buf generate buf.build/agynio/api \
            --path agynio/api/llm/v1 \
            --path agynio/api/users/v1 \
            --path agynio/api/authorization/v1 \
            --path agynio/api/ziti_management/v1 \
            --path agynio/api/identity/v1

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

      - name: Go test (e2e)
        run: go test -tags e2e -v -count=1 -timeout 120s ./test/e2e/
